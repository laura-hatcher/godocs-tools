<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoDocs CSM Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1A1916; --text2: #6B6860; --text3: #A8A59F;
    --red: #C9352A; --red-bg: #FDF0EF; --red-border: #F5C4C0;
    --green: #2D7A4F; --green-bg: #EDF7F1; --green-border: #A8DFC0;
    --blue: #1B5FA8; --blue-bg: #EEF4FC; --blue-border: #ACCAF0;
    --amber: #936010; --amber-bg: #FDF7EC; --amber-border: #F0D89A;
    --purple: #5240B8; --purple-bg: #F2F0FD; --purple-border: #C8C2F0;
    --teal: #1A7A6E; --teal-bg: #EBF7F5; --teal-border: #A0DDD6;
    --pink: #9C2D5E; --pink-bg: #FCF0F5; --pink-border: #EDB8D0;
    --gray: #4A4844; --gray-bg: #F0EEE9; --gray-border: #CCCAC4;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .app { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .header-left h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
  .header-left .subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .date-badge { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; }
  .btn-primary { font-size: 12px; font-family: 'DM Sans', sans-serif; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; font-weight: 500; }
  .btn-primary:hover { opacity: .8; }
  .btn-outline { font-size: 12px; font-family: 'DM Sans', sans-serif; background: transparent; color: var(--text2); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; }
  .btn-outline:hover { background: var(--surface2); }

  .nav { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .nav-tab { font-size: 13px; padding: 8px 16px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; transition: color .15s; }
  .nav-tab:hover { color: var(--text2); }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  .page { display: none; }
  .page.active { display: block; }

  .stats { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; display: flex; align-items: baseline; gap: 6px; }
  .stat-val { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 11px; color: var(--text3); }

  .cols { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
  .col-head { display: flex; align-items: center; justify-content: space-between; padding: 0 2px 10px; }
  .col-title { font-size: 11px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); }
  .col-count { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); border-radius: 20px; padding: 1px 8px; color: var(--text3); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: var(--border-strong); }
  .card.is-today { border-left: 3px solid var(--blue); }
  .card.is-priority { border-left: 3px solid var(--red) !important; }
  .col-done .card { opacity: .45; }
  .card-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; flex: 1; }
  .card-title.done { text-decoration: line-through; color: var(--text3); }
  .card-amt { font-size: 12px; font-weight: 400; color: var(--text2); }

  .flags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; border: 1px solid transparent; }
  .flag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; cursor: pointer; border: 1px solid transparent; user-select: none; transition: opacity .15s; }
  .flag:hover { opacity: .75; }
  .flag-priority-on  { background: var(--red-bg);   color: var(--red);   border-color: var(--red-border); }
  .flag-priority-off { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .flag-revenue-on   { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .flag-revenue-off  { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .b-rev { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border); }
  .b-exe { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); }
  .b-cst { background: var(--teal-bg);   color: var(--teal);   border-color: var(--teal-border); }
  .b-exp { background: var(--amber-bg);  color: var(--amber);  border-color: var(--amber-border); }
  .b-ren { background: var(--blue-bg);   color: var(--blue);   border-color: var(--blue-border); }
  .b-mkt { background: var(--pink-bg);   color: var(--pink);   border-color: var(--pink-border); }
  .b-mgm { background: var(--gray-bg);   color: var(--gray);   border-color: var(--gray-border); }

  .divider { height: 1px; background: var(--border); margin: 8px 0; }
  .narrative { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .narr-label { font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
  .narr-text { font-size: 12px; color: var(--text2); line-height: 1.5; }

  .card-expanded { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .move-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .mv-btn { font-size: 11px; padding: 4px 11px; border: 1px solid var(--border-strong); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .mv-btn:hover { background: var(--surface2); color: var(--text); }
  .edit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .field-label { font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  textarea { width: 100%; font-size: 12px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 7px 9px; resize: none; color: var(--text); background: var(--bg); line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--blue); }
  .edit-btns { display: flex; justify-content: flex-end; gap: 6px; }
  .btn-save { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 5px 14px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; cursor: pointer; font-weight: 500; }
  .btn-cancel { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 5px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text3); cursor: pointer; }

  .activity { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .activity-label { font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
  .activity-item { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
  .activity-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); flex-shrink: 0; margin-top: 5px; }
  .activity-text { font-size: 11px; color: var(--text2); flex: 1; line-height: 1.4; }
  .activity-time { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

  .subs { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .sub { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
  .sch { width: 13px; height: 13px; border-radius: 3px; border: 1px solid var(--border-strong); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .sch.on { background: var(--green); border-color: var(--green); }
  .sch.on::after { content: ''; display: block; width: 4px; height: 2.5px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-.5px); }
  .slbl { font-size: 12px; color: var(--text2); }
  .slbl.done { text-decoration: line-through; color: var(--text3); }

  /* Done Log */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-header h2 { font-size: 16px; font-weight: 500; }
  .empty-state { font-size: 13px; color: var(--text3); padding: 48px 0; text-align: center; }
  .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .log-entry-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .log-entry-note { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .log-entry-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); white-space: nowrap; }

  /* Snapshot */
  .snapshot-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
  .snapshot-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .snapshot-top h2 { font-size: 15px; font-weight: 500; }
  .snapshot-top-btns { display: flex; gap: 8px; }
  .snapshot-section { margin-bottom: 18px; }
  .snapshot-section-label { font-size: 10px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .snapshot-item { font-size: 12px; color: var(--text2); padding: 4px 0; line-height: 1.5; display: flex; gap: 8px; }
  .snapshot-item::before { content: '—'; color: var(--text3); flex-shrink: 0; }
  .snapshot-empty { font-size: 12px; color: var(--text3); font-style: italic; padding: 4px 0; }
  .copy-btn { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: transparent; color: var(--text2); cursor: pointer; }
  .copy-btn:hover { background: var(--surface2); }
  .copy-btn.copied { color: var(--green); border-color: var(--green-border); }

  /* GitHub Settings */
  .gh-bar { display:flex; align-items:center; gap:8px; padding:6px 0 16px; }
  .gh-status { font-size:11px; font-family:'DM Mono',monospace; padding:3px 10px; border-radius:20px; }
  .gh-status.connected { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .gh-status.disconnected { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
  .gh-status.saving { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-border); }
  .gh-status.error { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 20px 22px; width: 480px; max-width: 95vw; border: 1px solid var(--border-strong); }
  .modal h2 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .modal-field { margin-bottom: 10px; }
  .modal-field label { font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); display: block; margin-bottom: 4px; }
  .modal-field input, .modal-field select { width: 100%; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 7px 9px; color: var(--text); background: var(--bg); }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--blue); }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 6px; margin-top: 14px; }
  .modal-checks { display: flex; gap: 14px; margin-top: 6px; }
  .modal-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .modal-check input[type=checkbox] { width: auto; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>CSM Board</h1>
      <div class="subtitle">Laura Hatcher — GoDocs</div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="date-badge"></div>
      <span class="gh-status disconnected" id="gh-status">⚙ Not connected</span>
      <button class="btn-outline" onclick="openGHSettings()" style="font-size:11px;padding:4px 10px;">GitHub</button>
      <button class="btn-outline" onclick="openModal()">+ Add task</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-tab active" onclick="switchTab('board',this)">Board</button>
    <button class="nav-tab" onclick="switchTab('log',this)">Done log</button>
    <button class="nav-tab" onclick="switchTab('snapshot',this)">Weekly snapshot</button>
  </div>

  <div class="page active" id="page-board">
    <div class="stats" id="stats"></div>
    <div class="cols">
      <div><div class="col-head"><span class="col-title">Today</span><span class="col-count" id="ct-today">0</span></div><div id="col-today" class="col-today"></div></div>
      <div><div class="col-head"><span class="col-title">In progress</span><span class="col-count" id="ct-inprog">0</span></div><div id="col-inprog"></div></div>
      <div><div class="col-head"><span class="col-title">Waiting</span><span class="col-count" id="ct-wait">0</span></div><div id="col-wait"></div></div>
      <div><div class="col-head"><span class="col-title">Done</span><span class="col-count" id="ct-done">0</span></div><div id="col-done" class="col-done"></div></div>
    </div>
  </div>

  <div class="page" id="page-log">
    <div class="page-header">
      <h2>Done log</h2>
      <button class="btn-outline" style="font-size:11px;padding:4px 10px;" onclick="clearLog()">Clear log</button>
    </div>
    <div id="log-list"></div>
  </div>

  <div class="page" id="page-snapshot">
    <div class="snapshot-box">
      <div class="snapshot-top">
        <h2 id="snapshot-title">Weekly snapshot</h2>
        <div class="snapshot-top-btns">
          <button class="copy-btn" id="copy-btn" onclick="copySnapshot()">Copy as text</button>
          <button class="btn-outline" onclick="buildSnapshot()">Refresh</button>
        </div>
      </div>
      <div id="snapshot-content"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="gh-modal">
  <div class="modal">
    <h2>GitHub Sync Settings</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.5;">Your data will be saved to your <code>godocs-tools</code> repo as a JSON file. Enter your GitHub token and username below — stored in this browser only.</p>
    <div class="modal-field"><label>GitHub Username</label><input type="text" id="gh-user" placeholder="e.g. laura-hatcher"></div>
    <div class="modal-field"><label>Personal Access Token</label><input type="password" id="gh-token" placeholder="ghp_..."></div>
    <div class="modal-field"><label>Repository</label><input type="text" id="gh-repo" placeholder="godocs-tools" value="godocs-tools"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeGHSettings()">Cancel</button>
      <button class="btn-save" onclick="saveGHSettings()">Save & Connect</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add task</h2>
    <div class="modal-field"><label>Title</label><input type="text" id="m-title" placeholder="e.g. Flagstar — contract review"></div>
    <div class="modal-row">
      <div class="modal-field"><label>Category</label>
        <select id="m-cat">
          <option value="rev">Strategic Revenue</option>
          <option value="exe">Executive Initiative</option>
          <option value="cst">Customer Deliverable</option>
          <option value="exp">Expansion Revenue</option>
          <option value="ren">Renewal Monitoring</option>
          <option value="mkt">Marketing</option>
          <option value="mgm">Customer Management</option>
        </select>
      </div>
      <div class="modal-field"><label>Column</label>
        <select id="m-col">
          <option value="today">Today</option>
          <option value="inprog" selected>In progress</option>
          <option value="wait">Waiting</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Status</label><input type="text" id="m-status" placeholder="Current status..."></div>
      <div class="modal-field"><label>Next step</label><input type="text" id="m-next" placeholder="Next action..."></div>
    </div>
    <div class="modal-field"><label>Amount (optional)</label><input type="text" id="m-amt" placeholder="e.g. $200K"></div>
    <div class="modal-checks">
      <label class="modal-check"><input type="checkbox" id="m-priority"> High priority</label>
      <label class="modal-check"><input type="checkbox" id="m-revenue"> Revenue-affecting</label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<script>
// ── GitHub Sync ──────────────────────────────────────────────
var GH_FILE = 'csm-board-data.json';
var ghUser, ghToken, ghRepo, ghSha;

function ghLoad() {
  ghUser  = localStorage.getItem('gh_user')  || '';
  ghToken = localStorage.getItem('gh_token') || '';
  ghRepo  = localStorage.getItem('gh_repo')  || 'godocs-tools';
}

function setStatus(state, msg) {
  var el = document.getElementById('gh-status');
  el.className = 'gh-status ' + state;
  el.textContent = msg;
}

async function fetchFromGitHub() {
  if (!ghUser || !ghToken) return false;
  try {
    setStatus('saving', '↓ Loading...');
    var r = await fetch('https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/' + GH_FILE, {
      headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (r.status === 404) {
      setStatus('connected', '✓ Connected (new file)');
      return false;
    }
    if (!r.ok) { setStatus('error', '✗ Auth failed'); return false; }
    var json = await r.json();
    ghSha = json.sha;
    var data = JSON.parse(atob(json.content.replace(/\n/g, '')));
    tasks   = data.tasks   || JSON.parse(JSON.stringify(DEFAULT));
    doneLog = data.doneLog || [];
    tasks.forEach(function(t){ if(!t.log) t.log=[]; });
    setStatus('connected', '✓ Connected');
    return true;
  } catch(e) {
    setStatus('error', '✗ Error loading');
    return false;
  }
}

async function saveToGitHub() {
  if (!ghUser || !ghToken) return;
  setStatus('saving', '↑ Saving...');
  try {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify({ tasks: tasks, doneLog: doneLog }))));
    var body = { message: 'CSM Board update', content: content };
    if (ghSha) body.sha = ghSha;
    var r = await fetch('https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/' + GH_FILE, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + ghToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) { setStatus('error', '✗ Save failed'); return; }
    var json = await r.json();
    ghSha = json.content.sha;
    setStatus('connected', '✓ Saved ' + dateShort());
  } catch(e) {
    setStatus('error', '✗ Save error');
  }
}

function openGHSettings() {
  document.getElementById('gh-user').value  = ghUser;
  document.getElementById('gh-token').value = ghToken;
  document.getElementById('gh-repo').value  = ghRepo || 'godocs-tools';
  document.getElementById('gh-modal').classList.add('open');
}
function closeGHSettings() { document.getElementById('gh-modal').classList.remove('open'); }
async function saveGHSettings() {
  ghUser  = document.getElementById('gh-user').value.trim();
  ghToken = document.getElementById('gh-token').value.trim();
  ghRepo  = document.getElementById('gh-repo').value.trim() || 'godocs-tools';
  localStorage.setItem('gh_user',  ghUser);
  localStorage.setItem('gh_token', ghToken);
  localStorage.setItem('gh_repo',  ghRepo);
  closeGHSettings();
  var loaded = await fetchFromGitHub();
  nextId = tasks.reduce(function(m,t){ return Math.max(m,t.id); }, 0) + 1;
  render();
}

var COLS=['today','inprog','wait','done'];
var COL_LABELS={today:'Today',inprog:'In progress',wait:'Waiting',done:'Done'};
var CAT_LABELS={rev:'Strategic Revenue',exe:'Executive Initiative',cst:'Customer Deliverable',exp:'Expansion Revenue',ren:'Renewal Monitoring',mkt:'Marketing',mgm:'Customer Management'};

var tasks, doneLog;
ghLoad();
// Start with defaults; fetchFromGitHub() will override if connected
tasks = JSON.parse(JSON.stringify(DEFAULT));
doneLog = [];
var nextId = tasks.reduce(function(m,t){ return Math.max(m,t.id); }, 0) + 1;

function save(){
  saveToGitHub();
}

function dateShort(){return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dateFull(){return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

function addLog(t,msg){
  if(!t.log)t.log=[];
  t.log.unshift({text:msg,date:dateShort()});
  if(t.log.length>12)t.log=t.log.slice(0,12);
}

function switchTab(tab,el){
  document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='log')renderLog();
  if(tab==='snapshot')buildSnapshot();
}

function find(id){return tasks.find(function(x){return x.id===id;});}
function movesFor(col){return COLS.filter(function(c){return c!==col;}).map(function(c){return{to:c,label:'Move to '+COL_LABELS[c]};});}

function render(){
  document.getElementById('date-badge').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  var open=tasks.filter(function(t){return t.col!=='done';}).length;
  var tc=tasks.filter(function(t){return t.col==='today';}).length;
  var wc=tasks.filter(function(t){return t.col==='wait';}).length;
  var rc=tasks.filter(function(t){return t.revenue&&t.col!=='done';}).length;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><span class="stat-val">'+open+'</span><span class="stat-lbl">open</span></div>'+
    '<div class="stat"><span class="stat-val">'+tc+'</span><span class="stat-lbl">today</span></div>'+
    '<div class="stat"><span class="stat-val">'+wc+'</span><span class="stat-lbl">waiting</span></div>'+
    '<div class="stat"><span class="stat-val">'+rc+'</span><span class="stat-lbl">revenue items</span></div>'+
    '<div class="stat"><span class="stat-val">'+doneLog.length+'</span><span class="stat-lbl">completed</span></div>';

  COLS.forEach(function(col){
    document.getElementById('ct-'+col).textContent=tasks.filter(function(t){return t.col===col;}).length;
    document.getElementById('col-'+col).innerHTML=tasks.filter(function(t){return t.col===col;}).map(cardHtml).join('');
  });

  document.querySelectorAll('.card').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.mv-btn,.sch,.edit-area,.flag,.btn-save,.btn-cancel'))return;
      var t=find(+el.dataset.id);if(t){t.open=!t.open;save();render();}
    });
  });
  document.querySelectorAll('.flag').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var t=find(+el.dataset.id);if(!t)return;
      if(el.dataset.flag==='priority'){t.priority=!t.priority;addLog(t,t.priority?'Marked high priority':'Removed priority flag');}
      if(el.dataset.flag==='revenue'){t.revenue=!t.revenue;addLog(t,t.revenue?'Flagged as revenue-affecting':'Removed revenue flag');}
      save();render();
    });
  });
  document.querySelectorAll('.mv-btn').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var t=find(+el.dataset.id);if(!t)return;
      var to=el.dataset.to;
      addLog(t,'Moved to '+COL_LABELS[to]);
      if(to==='done'){
        doneLog.unshift({id:t.id,title:t.title,cat:t.cat,amt:t.amt,status:t.status,date:dateFull(),revenue:t.revenue,priority:t.priority});
      }
      t.col=to;t.open=false;save();render();
    });
  });
  document.querySelectorAll('.sch').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var t=find(+el.dataset.tid);if(!t)return;
      var s=t.subs.find(function(x){return x.id===el.dataset.sid;});
      if(s){s.done=!s.done;addLog(t,(s.done?'Completed: ':'Reopened: ')+s.label);save();render();}
    });
  });
  document.querySelectorAll('.btn-save').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var t=find(+el.dataset.id);if(!t)return;
      var ts=document.getElementById('ts-'+t.id);
      var tn=document.getElementById('tn-'+t.id);
      var changed=[];
      if(ts&&ts.value.trim()&&ts.value.trim()!==t.status){t.status=ts.value.trim();changed.push('Status updated');}
      if(tn&&tn.value.trim()&&tn.value.trim()!==t.next){t.next=tn.value.trim();changed.push('Next step updated');}
      if(changed.length)addLog(t,changed.join('; '));
      t.open=false;save();render();
    });
  });
  document.querySelectorAll('.btn-cancel').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var t=find(+el.dataset.id);if(t){t.open=false;render();}
    });
  });
}

function cardHtml(t){
  var hp=t.priority,hr=t.revenue;
  var cls='card'+(t.col==='today'?' is-today':'')+(hp?' is-priority':'');
  var h='<div class="'+cls+'" data-id="'+t.id+'">';
  h+='<div class="card-title-row"><div class="dot" style="background:'+(DOT[t.p]||'#A8A59F')+'"></div>';
  h+='<div class="card-title'+(t.col==='done'?' done':'')+'">'+t.title+(t.amt?' <span class="card-amt">'+t.amt+'</span>':'')+'</div></div>';
  h+='<div class="flags">';
  h+='<span class="badge b-'+t.cat+'">'+CAT_LABELS[t.cat]+'</span>';
  h+='<span class="flag '+(hp?'flag-priority-on':'flag-priority-off')+'" data-id="'+t.id+'" data-flag="priority">'+(hp?'▲ High priority':'▲ Priority')+'</span>';
  h+='<span class="flag '+(hr?'flag-revenue-on':'flag-revenue-off')+'" data-id="'+t.id+'" data-flag="revenue">'+(hr?'$ Revenue':'$ Revenue')+'</span>';
  h+='</div>';
  h+='<div class="divider"></div>';
  h+='<div class="narrative">';
  h+='<div><div class="narr-label">Status</div><div class="narr-text">'+(t.status||'—')+'</div></div>';
  h+='<div><div class="narr-label">Next</div><div class="narr-text">'+(t.next||'—')+'</div></div>';
  h+='</div>';
  if(t.open){
    h+='<div class="card-expanded">';
    h+='<div class="move-btns">';
    movesFor(t.col).forEach(function(m){h+='<button class="mv-btn" data-id="'+t.id+'" data-to="'+m.to+'">'+m.label+'</button>';});
    h+='</div>';
    h+='<div class="edit-area">';
    h+='<div class="edit-fields">';
    h+='<div><div class="field-label">Status</div><textarea id="ts-'+t.id+'" rows="2">'+(t.status||'')+'</textarea></div>';
    h+='<div><div class="field-label">Next step</div><textarea id="tn-'+t.id+'" rows="2">'+(t.next||'')+'</textarea></div>';
    h+='</div>';
    h+='<div class="edit-btns"><button class="btn-cancel" data-id="'+t.id+'">Cancel</button><button class="btn-save" data-id="'+t.id+'">Save</button></div>';
    h+='</div>';
    if(t.log&&t.log.length){
      h+='<div class="activity"><div class="activity-label">Activity</div>';
      t.log.forEach(function(l){
        h+='<div class="activity-item"><div class="activity-dot"></div><div class="activity-text">'+l.text+'</div><div class="activity-time">'+l.date+'</div></div>';
      });
      h+='</div>';
    }
    if(t.subs&&t.subs.length){
      h+='<div class="subs">';
      t.subs.forEach(function(s){
        h+='<div class="sub"><div class="sch'+(s.done?' on':'')+'" data-tid="'+t.id+'" data-sid="'+s.id+'"></div><span class="slbl'+(s.done?' done':'')+'">'+s.label+'</span></div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderLog(){
  var el=document.getElementById('log-list');
  if(!doneLog.length){el.innerHTML='<div class="empty-state">Nothing done yet — move a card to Done and it will appear here, timestamped.</div>';return;}
  el.innerHTML=doneLog.map(function(e){
    return '<div class="log-entry">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="log-entry-title">'+e.title+(e.amt?' <span style="font-weight:400;font-size:12px;color:var(--text2)">'+e.amt+'</span>':'')+'</div>'
      +'<div class="log-entry-note">'+e.status+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
      +'<span class="badge b-'+e.cat+'">'+CAT_LABELS[e.cat]+'</span>'
      +(e.revenue?'<span class="badge" style="background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)">$ Revenue</span>':'')
      +(e.priority?'<span class="badge" style="background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)">▲ Priority</span>':'')
      +'</div></div>'
      +'<div class="log-entry-date">'+e.date+'</div>'
      +'</div>';
  }).join('');
}

function clearLog(){
  if(confirm('Clear the done log? This cannot be undone.')){doneLog=[];save();renderLog();}
}

function buildSnapshot(){
  var d=new Date();
  var ws=new Date(d);ws.setDate(d.getDate()-((d.getDay()+6)%7));
  document.getElementById('snapshot-title').textContent='Week of '+ws.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  var completed=doneLog;
  var todayItems=tasks.filter(function(t){return t.col==='today';});
  var revOpen=tasks.filter(function(t){return t.revenue&&t.col!=='done';});
  var waiting=tasks.filter(function(t){return t.col==='wait';});
  var hiPri=tasks.filter(function(t){return t.priority&&t.col!=='done';});
  var h='';
  function section(label,items,fn,empty){
    h+='<div class="snapshot-section"><div class="snapshot-section-label">'+label+'</div>';
    if(!items.length)h+='<div class="snapshot-empty">'+empty+'</div>';
    else items.forEach(fn);
    h+='</div>';
  }
  section('Completed',completed,function(e){h+='<div class="snapshot-item">'+e.title+(e.amt?' ('+e.amt+')':'')+'</div>';},'Nothing moved to Done yet.');
  section('Today / active',todayItems,function(t){h+='<div class="snapshot-item">'+t.title+' — '+t.next+'</div>';},'No items in Today.');
  section('Open revenue items',revOpen,function(t){h+='<div class="snapshot-item">'+t.title+(t.amt?' ('+t.amt+')':'')+' ['+COL_LABELS[t.col]+']</div>';},'None flagged.');
  section('Waiting on others',waiting,function(t){h+='<div class="snapshot-item">'+t.title+' — '+t.next+'</div>';},'Nothing waiting.');
  section('High priority open',hiPri,function(t){h+='<div class="snapshot-item">'+t.title+' ['+COL_LABELS[t.col]+']</div>';},'None flagged.');
  document.getElementById('snapshot-content').innerHTML=h;
}

function copySnapshot(){
  var title=document.getElementById('snapshot-title').textContent;
  var completed=doneLog;
  var todayItems=tasks.filter(function(t){return t.col==='today';});
  var revOpen=tasks.filter(function(t){return t.revenue&&t.col!=='done';});
  var waiting=tasks.filter(function(t){return t.col==='wait';});
  var hiPri=tasks.filter(function(t){return t.priority&&t.col!=='done';});
  var lines=[title,''];
  function sec(label,items,fn,empty){
    lines.push(label.toUpperCase());
    if(!items.length)lines.push('  — '+empty);
    else items.forEach(function(x){lines.push('  — '+fn(x));});
    lines.push('');
  }
  sec('Completed',completed,function(e){return e.title+(e.amt?' ('+e.amt+')':'');},'Nothing done yet.');
  sec('Today / active',todayItems,function(t){return t.title+': '+t.next;},'None.');
  sec('Open revenue items',revOpen,function(t){return t.title+(t.amt?' ('+t.amt+')':'')+' ['+COL_LABELS[t.col]+']';},'None.');
  sec('Waiting on others',waiting,function(t){return t.title+': '+t.next;},'None.');
  sec('High priority open',hiPri,function(t){return t.title+' ['+COL_LABELS[t.col]+']';},'None.');
  try{
    navigator.clipboard.writeText(lines.join('\n'));
    var btn=document.getElementById('copy-btn');
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='Copy as text';btn.classList.remove('copied');},2000);
  }catch(e){alert(lines.join('\n'));}
}

function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('m-title').focus();}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function addTask(){
  var title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  var t={
    id:nextId++,p:6,
    cat:document.getElementById('m-cat').value,
    title:title,
    amt:document.getElementById('m-amt').value.trim(),
    status:document.getElementById('m-status').value.trim()||'Added.',
    next:document.getElementById('m-next').value.trim()||'TBD.',
    col:document.getElementById('m-col').value,
    priority:document.getElementById('m-priority').checked,
    revenue:document.getElementById('m-revenue').checked,
    subs:[],log:[],open:false
  };
  addLog(t,'Task created');
  tasks.push(t);save();closeModal();
  ['m-title','m-status','m-next','m-amt'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('m-priority').checked=false;
  document.getElementById('m-revenue').checked=false;
  render();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('gh-modal').addEventListener('click',function(e){if(e.target===this)closeGHSettings();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeGHSettings();}});

// Load from GitHub on startup if credentials exist
(async function(){
  if(ghUser && ghToken){
    var loaded = await fetchFromGitHub();
    if(loaded){ nextId=tasks.reduce(function(m,t){return Math.max(m,t.id);},0)+1; }
  } else {
    setStatus('disconnected','⚙ Click GitHub to connect');
  }
  render();
})();
